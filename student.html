    "吴俊毅": { photo: "img/wujunyi.jpg", comment: "引言：俊毅是个自带幽默感的孩子，有他在的晚课总是充满了欢乐。他很喜欢用代码来跟我开玩笑，有次偷偷把程序的输出结果改成了“老师真帅”，把我逗得不行。这种把冰冷代码玩出人情味的特质，让我特别喜欢这个机灵鬼。\n表现：作为一个性格开朗又随和的男孩，俊毅在学习C++时总能找到属于自己的乐趣。虽然有时候也会因为逻辑太复杂而抓耳挠腮，但他很少抱怨，总是能用乐观的心态去面对。他遇到卡壳的地方，总会跑过来趴在我桌子旁跟我“套近乎”求提示。我特别吃他这一套，在轻松的氛围中引导他理清思路，是我们俩心照不宣的默契。\n收获：经过这段时间的学习，俊毅在代码逻辑和专注力上都收获了明显的成长。他学会了收起一点点玩心，把更多的精力投入到算法的钻研中。他现在已经能把天马行空的想法收拢起来，化作键盘上踏实的敲击。希望俊毅能继续保持这份乐观和幽默，在充满挑战的C++学习中快乐前行，老师会一直在这里支持并见证你的成长。" },

    "白展旭": { photo: "img/baizhanxu.jpg", comment: "引言：展旭近些天真的给我带来了一个小惊喜，这个惊喜我也和孩子的家长分享了。我一直记得有次课上，他竟然主动要求上台去给大家讲解程序逻辑，那副自信又认真的小模样真的让我非常惊讶。\n表现：平时他总爱带些奇奇怪怪的小玩具分给我玩，完全没把我当成严肃的老师，而是当成了他的“好哥们儿”，这种被孩子全然信任、甚至依赖的感觉真的特别棒。作为一个充满灵气的男孩，展旭在课堂上总是带着一种天马行空的想象力。和他在一起玩、一起钻研代码的时候，我感觉自己仿佛也回到了童年，那些枯燥的逻辑在他的想象下都变得生动有趣起来。我很享受这种和他拉近距离的过程，因为只有这样，我才能更真切地探寻到他心里那些天真烂漫的想法。我也非常尊重并支持他每一个大胆的创意，在编程的世界里，这种不被束缚的灵魂是最珍贵的。\n收获：经过这段时间的编程学习，展旭在逻辑梳理和自我表达上都收获了显著的进步。他学会了把脑子里那些跳跃的创意火花，通过一行行代码有条理地呈现出来，不再只是单纯的空想，而是具备了更强的动手实践能力。他收获了站在台上面对大家分享的底气，也学会了如何通过逻辑让别人理解自己的创意。希望展旭能继续保持这份纯真和勇敢，在编程的奇幻世界里继续闯荡，老师会一直在这里支持并见证你的成长。" },


    "房本泽": { photo: "img/fangbenze.jpg", comment: "​引言：本泽这孩子的逆袭之路，真的是让我刮目相看。刚开始上电脑课的时候，他对键盘还很陌生，找字母比较吃力，于是我专门给他安排了几节打字特训课。有一次临近下课，他爸爸过来接他，就站在后面看他练习。在爸爸的注视下，本泽刚开始明显有些慌张，手忙脚乱的。但神奇的是，他很快就自己调整了过来，靠着自己的理解一下子就“悟”了，手指越敲越顺，顶着压力出色地完成了任务。那个瞬间，我看到了这孩子骨子里的韧性和极强的抗压能力。\n表现：到了正式上单片机课的时候，他简直像开了挂一样。无论是组装乐博乐博的硬件结构，还是编写控制程序，他总是班里最快、最准的那个，经常稳稳拿下第一。最让我惊喜的是他那股子自信，每次跑通了复杂的程序，他还会主动要求上台，像个小老师一样给全班同学讲解他的搭建思路和代码逻辑。看着他在台上神采飞扬地分享，我这个当老师的心里别提多骄傲了。\n收获：本泽不仅攻克了最初的打字难关，更收获了极其强大的自信心和出色的表达能力。他懂得了如何将压力转化为动力，在面对陌生事物时展现出了惊人的学习爆发力。你的整体进步远远超出了我的预期，老师非常非常看好你，希望你能一直带着这份自信和冲劲，在编程的世界里创造更多奇迹。" },
    "李纪龙": { photo: "img/lijilong.jpg", comment: "引言：纪龙是我们班的插班生，刚来的时候，看着大家熟练地摆弄那些单片机零件和代码，他眼神里透着一丝怯生生和迷茫。作为老师，我特别懂他那种想要融入却又无从下手的心情。我特意安排他坐在离我近的地方，每次看他小心翼翼地拿起乐博乐博的积木块向我求证拼法对不对时，我都觉得这孩子骨子里有一股默默使劲儿的倔强。\n表现：为了赶上大家的进度，纪龙在课堂上展现出了极强的专注力。他经常自己留在座位上，反复琢磨那些机械结构。遇到实在不懂的程序逻辑，他一开始不好意思问，后来跟我熟了，就会轻轻拉一下我的袖子，小声问我这个循环为什么不执行。这种踏实肯学的态度让他进步神速，没过几周，他不仅能独立完成当堂的搭建任务，甚至还能帮旁边的同学排查接错的线路。看着他从一开始的拘谨到后来和大家一起热烈讨论怎样让小车跑得更快，我心里特别有成就感。\n收获：纪龙用自己的汗水证明了什么叫厚积薄发。他不仅完全跨越了插班生初期的知识断层，稳稳地跟上了全班的节奏，更收获了极其珍贵的自信心。从起步时的陌生到如今能够游刃有余地编写控制程序，这种自我突破的经历将是他未来的强大底气。老师非常为你骄傲，期待你在这条路上带给我们更多的惊喜。" },


    "赵一卓": { photo: "img/zhaoyizhuo.jpg", comment: "引言：一卓是个特别暖心的孩子，上课的时候总是把笑脸挂在嘴边。让我印象最深的是，有次我嗓子不太舒服，他注意到了，跑过来小声问我“老师你要不要喝水”。那一刻真的觉得，除了教代码，能和这样贴心的孩子建立起深刻的情感连接，是我做老师最幸福的事。\n表现：作为一个性格温和又极其认真的男孩，一卓在课堂上总是最让我省心的那一个。不管是用Scratch写逻辑还是搭建单片机，他都会一步一个脚印地跟着节奏走。遇到卡壳的地方，他也不会烦躁，而是耐心地向我求助。我非常喜欢在课上点他回答问题，他那种思考时认真的小表情特别可爱。他在班里人缘也特别好，经常会帮着旁边的小伙伴找bug。\n收获：这段时间的编程学习，一卓在逻辑思维和自主排错能力上收获了非常明显的成长。他从最初需要老师手把手带着，到现在能够自己独立梳理程序的运行步骤，不再害怕那些复杂的嵌套模块。希望一卓能继续带着这份温暖和认真，在编程的学习中稳步向前，发现更多代码的乐趣，老师会一直在这里支持并见证你的成长。" },


    "张易洋": { photo: "img/zhangyiyang.jpg", comment: "引言：易洋这个小伙子就像一个小太阳，浑身散发着使不完的劲儿。他第一次来上课的时候，就拉着我问东问西，对教室里的各种机器人模型都充满了好奇。前两天他还带来了一个自己折的纸飞机要和我比试谁飞得远，这种毫无距离感的亲近，让我觉得和他在一起上课特别轻松愉快。\n表现：作为一个开朗外向、思维极其活跃的男孩，易洋在单片机课堂上特别敢于动手。他从不畏惧复杂的线路和程序，总有一种“先做出来试试看”的霸气。遇到马达不转或者程序报错，他第一反应不是气馁，而是拉着我一起“破案”。我非常欣赏他这种不怕失败、敢于试错的性格，这对于探究硬件背后的逻辑来说太重要了。\n收获：经过这段时间的学习，易洋在动手能力和逻辑连贯性上收获了极大的提升。他学会了让自己的手慢下来，配合着脑子里的逻辑一步步走，不再像以前那样全凭感觉拼搭和写代码了。他掌握了让软硬件完美配合的方法。希望易洋能继续保持这股阳光热情的冲劲儿，用你的行动力创造出更多酷炫的作品，老师会一直在这里支持并见证你的成长。" },


    "丁修煜": { photo: "img/dingxiu.jpg", comment: "引言：丁修煜是一个让我十分挂心又满含期待的孩子。刚开始接触他的时候，他是格外内敛的，几乎不怎么爱说话，总是喜欢用肢体语言来跟我表达。那时候他总是安安静静地做着自己的事情，不和其他孩子交流，连课间的玩耍都不参加，这让我印象很深，也让我一直想着怎么才能帮他慢慢打开心扉。\n表现：他是一位非常腼腆但又极其细心的男孩，修煜在单片机搭建的时候展现出了完全不一样的专注。他搭建得特别快，而且非常仔细。因为我的教学风格是比较轻松愉快的，经常会带动大家一起活动，所以我一直不断地尝试着鼓励他，多叫他回答问题，甚至鼓励他勇敢地走上讲台，给大家讲讲他对代码的理解。我非常欣赏他这种虽然内向，但只要投入进去就特别有韧劲的学习态度，这正是我们在单片机和代码世界里最宝贵的特质。\n收获：经过这段时间的编程学习，修煜在性格和表达上都收获了不小的改观。如今看来，他慢慢走出了自己的小世界，虽然依旧不怎么爱说话，但渐渐地也会开始关注周围的其他人了，上台分享代码逻辑时也多了一份底气。希望修煜能继续保持这份细心和专注，在编程的大家庭里越来越开朗，用你灵巧的双手创造出更多出色的作品，老师会一直在这里支持并见证你的成长。" },


    "田顺泽": { photo: "img/tianshunze.jpg", comment: "引言：顺顺是一个让我印象非常深刻的孩子。还记得初次见他时，他坐在讲台左手边最前排的位置。那节课上，他叽里呱啦地抛出了一大串问题，那些充满深度的思考完全超出了我对这个年龄段孩子的预期，让我十分惊讶，我也看到了他身上那份难得的博学与好奇心。\n表现：一个开朗又极具个性的男孩，顺顺在课堂上一直散发着不停歇的活力。他不仅喜欢提问，而且非常有主见，有着自己独立的思考方式。我也非常喜欢提问他，有时候提问的次数多了他也会让我“诉苦”。上课的时候，他总是爱自己钻研和探索，遇到有趣的逻辑总想着加入自己的创意。我非常欣赏他这种勇于表达、敢于质疑的学习态度，这正是探究代码当中逻辑的最宝贵的特质。\n收获：经过这段时间的编程学习，顺顺在知识和能力上都收获了明显的成长。他学会了用逻辑去分析问题，不在是像之前一样，随意修改程序的数值，而是会将脑海中天马行空的创意分类分析，一步步落实成具体的程序。希望顺顺能继续保持这份对未知的好奇和渴望，用天马行空的想法创造出更多令人惊叹的编程作品，老师会一直在这里支持并见证你的成长。" },


    "赵佑旭": { photo: "img/zhaoyouxu.jpg", comment: "引言：夏天，我和他可是老相识了，他和大帅以前就是同班同学，现在也凑在一个班里，两个人的默契和那股在写程序时候比学赶超的劲儿我都看在眼里。最让我印象深刻且引以为傲的，还是他在之前的比赛中拿到了非常出色的成绩，甚至获邀远赴浙江参加国赛。看着他一步步冲进更高规格的赛场，那种作为老师的自豪感，到现在想起来都还觉得特别带劲。\n表现：作为一个心思细腻男孩，夏天在课堂上总有一种超乎同龄人的沉稳。他不像有些孩子那样容易浮躁，而是能安安静静地钻进代码里，这可能也是他能在比赛中脱颖而出的秘诀。在平时的课堂互动中，他也特别大方，经常和我聊天，在完成任务之后还能带动周围的氛围，他可是我上课不冷场的强力保障。我非常欣赏他这种平时踏实肯干、关键时刻又能顶得住压力的特质，很难得。\n收获：这段时间的编程学习，特别是经历了国赛的洗礼，夏天的眼界和能力都收获了全方位的提升。比赛不再只盯着眼前的输赢，他收获了面对大型赛事时的那份从容，也学会了如何在复杂问题面前保持清醒的头脑。希望夏天能继续保持这股冲击巅峰的韧劲，在未来的编程道路上创造更多属于自己的高光时刻，老师会一直在这里支持并见证你的成长。" },


    "路浩洋": { photo: "img/luhaoyang.jpg", comment: "引言：大帅最近的变化真的太让我惊喜了，这孩子简直就是“开窍了”的典型代表。我还记得挺久之前第一次录讲课视频的时候，大帅竟然是自己主动跑过来要讲的，那一刻他眼睛里那种渴望表达的小火苗，一下子就让我记住了。作为老师，看到他这种从内心深处发出来的积极主动，真的特别感慨。\n表现：大帅是一个非常有主见、而且越来越自信的男孩，他在课堂上那种专注思考的状态特别打动人。以前他写代码可能更多是照着我的样子去模仿，有点“比着做”的意思，但现在的大帅已经完全不一样了，他已经能独立思考并真正理解这些程序背后的运行逻辑。现在的浩洋非常喜欢上台分享，哪怕面对大家，他也能大大方方地讲出自己的思路，那种自信淡定的样子，确实是长大了，也变得更有底气了。\n收获：这段时间的编程课，大帅不仅在代码知识上收获了扎实的基础，更重要的是他收获了独立分析问题的能力。他不再是像以前那样依赖老师的样板，而是能把脑子里的创意一点点变成具体的程序。希望大帅能一直保持这种爱钻研、爱分享的热情，用你那股“开窍”后的劲头去创造更多精彩的作品，老师会一直在这里支持并见证你的成长。" },



    "大正": { photo: "img/dazheng.jpg", comment: "引言：大正真的就像我们班里的“定海神针”，有着远超同年龄段的沉稳。有次课前，别的孩子都在满教室追打，他却端着水杯悠哉游哉地走到我跟前，问我下节课是不是要学新传感器了。这种亦师亦友的交流，让我每次上他的课都觉得特别轻松。\n表现：在学习单片机和Scratch的过程中，他是虽然不是个十足的完美主义者。搭建没有条理，但每次机器人线路接得清清楚楚，代码模块也排列得整整齐齐。前阵子我们做攀爬机器人的时候，他连重心的位置都要反复调整好几次才满意。我特别欣赏他这种不急不躁的态度，遇到bug时他那种抽丝剥茧排查问题的架势，已经完全有了小工程师的影子。\n收获：这段时间的学习让他对软硬件结合的理解更加深刻了。他收获了独立解决复杂机械问题的能力，更重要的是培养了一种严谨的工程思维，这对他未来的理科学习将会有极大帮助。" },



    "胡家宝": { photo: "img/hujiabao.jpg", comment: "引言：家宝对机械和机器人的痴迷简直到了狂热的地步。很好的孩子，家宝是我最看好的孩子之一，应该说没有“之”，家宝之前手部受伤，我去询问他的情况时候，家宝妈妈说这几天家宝都吵着去，我挺感动，之前比赛也是，我和他打了一个电话，鼓励了一下他，他就参加比赛了。这种把生活观察融入到课堂里的热情，真的非常打动我，也让我特别期待他每次的作品。\n表现：作为一个动手能力极强的男孩，他在搭建时胆子很大，很快就能悟出模块和模块的关系。在编程方面，他现在也慢慢学会了静下心来琢磨逻辑，不再是一味地追求硬件外表的酷炫。有时候为了一个转弯的角度，他能趴在地上跟着小车跑好几圈，那种专注投入的劲头特别感染人。\n收获：经过这段时间的磨砺，家宝把对机器人的热爱成功转化为了克服困难的动力。他收获了从理论到实践的完整跨越，懂得了如何用代码赋予机械真正的生命，动手能力和逻辑构思都上了一个新台阶"},




    "赵恩卓": { photo: "img/zhaoenzhuo.jpg", comment: "引言：恩卓这孩子心思细腻又懂得感恩，有次上课悄悄往我手里塞了一块他最喜欢吃的巧克力，还小声跟我说“老师你辛苦了”，那个瞬间我觉得再累也值了。这种能注意到老师情绪的孩子，内心一定非常柔软且充满灵气。\n表现：作为一个追求完美的男孩，恩卓在Scratch编程上有着非常独特的审美，给角色设计的动作和剧情总有一股子灵性。对待单片机搭建，他也是个细节控，稍微有一点零件歪斜都要拆了重装。他很喜欢拉着我去看他设计的那些小特效，那种期待被认可的小眼神，让我特别愿意多花时间陪他一起打磨作品。\n收获：经过这段时间的历练，他在程序逻辑的连贯性上有了很大的突破。他学会了将感性的创意和理性的逻辑结合起来，作品变得越来越完整。希望恩卓能继续用这颗细腻的心去感受世界，在代码的画板上描绘出更多动人的故事。" },


    "郭昊阳": { photo: "img/guohaoyang.jpg", comment: "引言：昊阳是个风风火火的阳光男孩，经常是满头大汗地跑进教室，但只要坐在电脑前，他就能瞬间进入状态。他对乐博有自己的感情，有一次不是乐博的课程，他也进入了乐博。我前去叮嘱他，问他搞错时间了吗？他对我说：我口渴了，来喝点水。我当时听他说这句话时，我明白了，他把乐博当成“家”了，而我们是大的“家人”。非要和我一起用上课学的原理把它修好，那份对我的信任和对知识的学以致用，让我心里别提多有成就感了。\n表现：他脑子转得飞快，领悟力极强，我讲的单片机控制原理他总是最先听懂的。不过有时候他会因为性子急而漏掉一两个积木块，我就经常在旁边拍拍他的肩膀让他深呼吸慢下来。在掌握了套件的使用后，他特别喜欢挑战高难度的动作设计，不怕失败，错了就重头再来，非常有冲劲。\n收获：现在昊阳已经学会了在编写复杂程序时理清思路，那种因为粗心导致的报错越来越少了。他最大的收获是懂得了如何控制自己的节奏，把急躁转化成了高效的执行力，在软硬件结合的探索中走得越来越稳。" },



    "房晓晨": { photo: "img/fangxiaochen.jpg", comment: "引言：晓晨平时在班里不怎么张扬，是个喜欢用作品说话的孩子。她有画画的特长，最喜欢把自己画的元素融入到Scratch游戏里，每次她的作品展示总能引起大家的惊叹。她把我当成懂她的知音，遇到得意的设计总会第一时间招呼我过去看。\n表现：作为一个极具艺术天赋的女孩，她在编程课上展现出的不仅仅是逻辑，更是美感。在单片机课上，她也表现出了极强的耐心，那些繁琐的接线对他来说似乎是一种享受。她不像有些孩子遇到报错就心急，她会安安静静地盯着屏幕思考，偶尔抬头问我一个直击要害的问题。我很欣赏她这种沉稳又富有创造力的性格。\n收获：这段时间她将自己的艺术天赋和编程逻辑结合得越来越好。收获了跨学科思考的能力，懂得如何用代码去实现艺术构想，这种独特的综合素质让她未来的作品充满无限可能。" },


    "王昱棋": { photo: "img/wangyuqi.jpg", comment: "引言：棋棋是我们C++班里难得的女孩子，也是个特别惹人疼的小姑娘。刚开始接触C++的时候，面对黑底白字的屏幕她稍微有点怯场。但我总记得她下课后喜欢和我分享她看过的课外书，那种细腻和温柔，让枯燥的代码课堂多了很多生机。\n表现：作为一个心思细腻的女孩，棋棋的代码写得极其工整。我会专门在她的代码旁边写上详细的中文注释，帮她理解那些抽象的逻辑，她每次都会认真地看很久。有几次遇到逻辑死角，她眼眶都急红了，但在我的鼓励下，她还是咬着牙自己把bug找了出来，骨子里那股劲儿特别坚韧。\n收获：现在的棋棋逻辑思维越来越严密，那种在代码世界里独立思考的自信让她整个人都闪闪发光。她不仅掌握了扎实的语法基础，更学会了如何面对高难度的智力挑战，为接下来的考级打下了坚实基础。" },



    "高润泽": { photo: "img/gaorunze.jpg", comment: "引言：润泽是个骨子里透着不服输精神的硬核男孩。最近几周我们在做C++迷宫生成项目，他为了让迷宫的路径更复杂，硬是拉着我讨论了好几种不同的算法。他成功运行出结果的那一刻，激动地和我重重地击了个掌，那种成就感我也感同身受。\n表现：他在课堂上特别敢于挑战，有时候还会质疑我的代码是不是最优解，我太喜欢他这种打破砂锅问到底的劲头了。面对复杂的逻辑，他习惯一行行地去抠细节，非常喜欢通过修改变量看实际效果。他完全不怕报错，反而觉得每次解决bug都像是在打怪升级，越战越勇。\n收获：通过这段时间的深耕，他在算法优化和复杂数据处理上有了极大的提升。他不仅收获了扎实的C++基本功，更收获了一种迎难而上的极客精神，这种解决问题的思维模型将是他最宝贵的财富。" },




    "张秉政": { photo: "img/zhangbingzheng.jpg", comment: "引言：秉政是个名副其实的“十万个为什么”。他不仅对C++的底层逻辑充满好奇，还经常带来一些他在网上看到的新奇科技新闻和我探讨，甚至问我以后能不能用代码接入人工智能大模型。他这种跳出课本的广阔视野，让我们的互动总是充满了惊喜。\n表现：在敲代码的时候，他追求极致的效率，总想着怎么把复杂的代码精简下来。他非常聪明，一点就透，遇到不会的就马上举手，特别乐于和我互动。他有时会因为一个循环结构缠着我问好几种实现方式，这种对技术纯粹的热爱在同龄人中真的很少见。\n收获：这段时间下来，他的编程思维变得更加开阔和灵活。他学会了用更宏大的视角去理解代码背后的意义，逻辑构建能力突飞猛进，尤其是在处理抽象数据结构方面展现了过人的天赋。" },


    "张泽昊": { photo: "img/zhangzehao.jpg", comment: "引言：泽昊在C++课堂上有着极强的胜负欲，这是他进步的巨大动力。他敲键盘的手速极快，每次写完一段程序，总要昂起头看看周围的小伙伴进行到哪一步了。有次他为了赶进度把循环条件写错了，急得满头大汗，我过去轻轻点拨了一下，他立刻恍然大悟，还不好意思地挠了挠头。\n表现：作为一个充满竞争意识的男孩，他在面对复杂的算法时总是冲在最前面。他非常喜欢和我讨论如何让程序跑得更快，那种对效率的追求非常有极客范儿。在这个过程中，他慢慢学会了欲速则不达的道理，开始学会静下心来写详细的代码注释，这种转变是非常客观的。\n收获：他最大的进步是学会了在速度与准确率之间寻找平衡。他不仅掌握了扎实的语法，更收获了面对挫折时的韧性。看到他逐渐把那份急躁转化为对代码质量的追求，我感到由衷的高兴。" },



    "张泽恒": { photo: "img/zhangzeheng.jpg", comment: "引言：泽恒是个稍微有点起床气的小家伙，周日早上刚来的时候偶尔会打个哈欠。但只要我一拿出单片机套件，或者马达一转起来，他眼睛里的光立马就亮了。他是个典型的行动派，喜欢通过不断的动手测试来验证程序对不对。\n表现：作为一个直率又热情的男孩，他经常把我当成他的试验对象，拿着组装好的小车往我脚边开，这种毫无防备的亲昵让我觉得特别有趣。他不喜欢看长篇大论的理论，更喜欢在拼搭中寻找规律。遇到传感器数值跳动，他会反复调整角度直到成功为止，那种在“玩”中钻研的劲头非常棒。\n收获：现在的泽恒对软硬件的结合已经游刃有余。他学会了如何通过逻辑积木去控制复杂的硬件动作，排查问题的耐心也提高了很多。这份在实践中习得的知识远比书本上的扎实。" },




    "张泽航": { photo: "img/zhangzehang.jpg", comment: "引言：泽航是个自带工程师气质的细心男孩。在单片机课堂上，他对乐博乐博套件的熟悉程度堪称一绝，任何一个小零件他都能迅速找到并精准组装。他是个特别让人放心的孩子，前两天他还跟我讲了他对未来智能家居的设想，那种认真的神态让我相信他未来一定会大有作为。\n表现：作为一个严谨踏实的男孩，泽航写程序也是步步为营，很少犯低级错误。他非常享受解决问题的过程，每次成功跑通一个复杂的自动化程序，他都会露出那种很有成就感的微笑。他很愿意和我分享他的设计思路，哪怕是一个小小的传感器布局他都有自己的道理。\n收获：这段时间他的系统性思维得到了很好的锻炼，能够从全局去把控一个项目的运行。他不仅学会了编程技术，更收获了严谨的工程思维，逻辑组织能力在班级里出类拔萃。" },



    "王钰焯": { photo: "img/wangyuzhuo.jpg", comment: "引言：钰焯是个情感极其丰富、同理心很强的孩子。当他的程序第一次成功控制单片机发出声音的时候，他激动得手舞足蹈，拉着我的衣角让我看。我很珍视他这种纯粹的快乐，这也正是我教编程的初衷——让孩子在创造中感受到最真实的喜悦。\n表现：作为一个心思敏锐的男孩，他写的Scratch游戏不仅好玩，还经常带带有温情的小情节。他在课堂上非常活跃，遇到好玩的功能总会第一时间跑过来跟我展示。虽然有时候搭建的速度慢一点，但他对细节的把控非常到位。我非常享受和他这种像哥们儿一样的互动。\n收获：经过这段时间的学习，他学会了将感性的思维与理性的逻辑相融合。他收获了用技术表达情感的能力，编程对他来说不再是冷冰冰的指令，而是一个充满可能的创作世界。" },




    "张禹森": { photo: "img/zhangyusen.jpg", comment: "引言：禹森的胆子特别大，脑子里装满了各种疯狂的点子。在单片机课上，他最喜欢干的事就是偷偷把马达的转速参数调到最大，看看小车会不会“飞”起来。虽然有时候会搞出一些小状况，但我从来不批评他，反而鼓励他去弄明白为什么会失控。\n表现：作为一个充满冒险精神的男孩，他那种敢于打破常规的勇气是非常稀缺的。他在课堂上非常愿意动手尝试，哪怕是一个完全陌生的模块，他也要先插上电源试试。我也特别乐于和他一起“折腾”，在轻松的氛围中引导他去学习背后的物理知识。他现在已经懂得了在创意和严谨逻辑之间寻找平衡。\n收获：他最大的收获是学会了“有节制的创造”。他明白了大胆设想之后还需要小心求证，逻辑构架能力在一次次“翻车”和“重来”中得到了飞速提升，动手排雷的能力极强。" },




    "王浩琪": { photo: "img/wanghaoqi.jpg", comment: "引言：浩琪就像个不知疲倦的小马达，周日上午的课他总是充满干劲。他是个极其外向的孩子，一边搭着单片机，一边还要跟我讲他周末去哪儿玩了，把课堂氛围烘托得特别热闹。这种像朋友一样的闲聊，让我们的师生关系变得非常紧密。\n表现：作为一个开朗活泼的男孩，他绝不是只说不练。一旦进入写代码的环节，他又能迅速收心，展现出极高的执行力。他非常喜欢跟我玩一些逻辑小游戏，挑战我的反应速度。这种动静结合的特质让他学得非常轻松，面对复杂的线路连线也能有条不紊。\n收获：这段时间他解决硬件问题的能力越来越强，逻辑连贯性也有了很大的进步。他收获了在快乐中解决复杂问题的能力，这种心态让他未来的学习之路充满了正向动力。" },



    "孙铭朗": { photo: "img/sunminglang.jpg", comment: "引言：铭朗是个早熟且非常有责任感的男孩。年后的课上我拿出了新学习的小威奇套件做测试，他成了我最得力的“小助手”。他领悟力极高，对新硬件的接受能力甚至超过了我的预期，那种专注钻研的背影经常让我忘了他也只是个孩子。\n表现：作为一个逻辑极强的男孩，他遇到不懂的问题绝不糊弄，总是逻辑清晰地向我提问。在课堂上，他不仅自己学得快，还经常会像个小老师一样去点拨旁边的同学。我很信任他，经常会给他一些额外的挑战任务。他这种稳重又不失热情的学习状态确实非常难得。\n收获：这段时间的学习让他在软硬件交互的理解上达到了一个新的高度。他具备了独立设计复杂项目的基础，收获了更广阔的技术视野和解决综合问题的能力，综合素质非常优秀。" },



    "田交正": { photo: "img/tianjiaozheng.jpg", comment: "引言：交正在班里是个非常低调的存在，但他绝对是那种“闷声干大事”的孩子。他话不多，但做出来的单片机作品总是最稳定、最少出毛病的。有次我看他为一个积木块的逻辑纠结了很久，最后自己豁然开朗时露出的那个羞涩笑容，特别打动我。\n表现：作为一个有着超强定力的男孩，他能够长时间沉浸在自己的思维世界里，不受外界干扰。他在拼搭零件时非常细致，每一处扣合都要反复检查。他虽然很少主动举手发言，但每次我走到他身边问他思路时，他都能条理清晰地阐述出来，基本功非常扎实。\n收获：他最大的收获是建立起了系统化的编程思维。他不再只是机械地模仿，而是有了自己的设计逻辑。这种厚积薄发的学习习惯，将助力他在未来的科技学习中走得更稳更远。" },



    "李金恒": { photo: "img/lijinheng.jpg", comment: "引言：金恒对C++有着非常敏锐的直觉。在最近做的迷宫生成项目中，他不仅完成了基础任务，还突发奇想给程序加了一个计时器功能。他跑过来跟我分享这个点子的时候，眼睛里满是自豪，那种想要挑战更高难度的劲头让我看到了一个未来程序员的身影。\n表现：作为一个极具探索欲的男孩，他在课堂上从不满足于课本上的例题。他非常喜欢去修改代码参数，看看会出现什么意想不到的结果。在一次次的代码调试中，他的抗挫折能力得到了极大的锻炼，经常拉着我讨论一些底层的逻辑原理。\n收获：他不仅收获了扎实的C++语法知识，更收获了一种勇于创新的思维方式。面对复杂的算法他也能保持冷静思考，逻辑思维的深度和广度都得到了极大的加强。" },



    "陈子嘉": { photo: "img/chenzijia.jpg", comment: "引言：子嘉是个求知若渴的宝藏男孩。他在C++课上不仅关注语法本身，还对整个计算机科学领域充满了兴趣。他曾多次向我询问关于前沿AI模型的技术原理，这种前瞻性的思考在小学生中非常难得。我也非常乐于和他交流这些知识，这种教学相长的感觉特别棒。\n表现：作为一个心思缜密的男孩，他的代码风格非常清晰，喜欢写详尽的注释。他在解决逻辑问题时非常有耐心，哪怕是一个小小的分号报错，他也能对照着资料自己排查出来。他上课时的专注力特别集中，遇到关键逻辑点总会认真记录，学习态度非常严谨。\n收获：这段时间的学习让他的逻辑架构能力有了质的飞跃。他学会了从更宏观的角度去理解程序运行的本质，收获了严谨的学习习惯和宽广的技术视野。" },


    "岳政硕": { photo: "img/yuezhengshuo.jpg", comment: "引言：政硕的理科思维极其发达，是个不可多得的数学小天才。他非常善于将数学模型运用到C++编程中，处理那些复杂的计算逻辑时总能找到最巧妙的算法。有次他用一个非常简洁的逻辑简化了一大段代码，让我这个当老师的都忍不住拍案叫绝。\n表现：作为一个思维极其敏捷的男孩，他平时跟我交流也全是硬核的技术探讨。他在课堂上总是学得最快的那一个，完成任务后会去钻研一些更高阶的函数。他虽然在代码上很精干，但平时性格很随和，这种反差让他非常受同学欢迎。\n收获：他现在已经能够非常熟练地运用C++解决实际问题。他最大的收获是将抽象的数学思维成功转化为了具体的编程实践能力，这种跨学科的融合能力是他最核心的竞争优势。" },

    "李晨": { photo: "img/lichen.jpg", comment: "引言：李晨刚接触C++编程的时候确实经历了一段小小的阵痛期，看着满屏的英文经常皱眉头。但我一直陪着他，帮他一行行理清思路，像哥们儿一样鼓励他。当他第一次靠自己的能力顺利跑通一个复杂程序时，他笑得特别灿烂，那个瞬间我也非常有成就感。\n表现：作为一个内心坚韧的男孩，他在找回自信后进步非常迅速。他现在上课非常主动，遇到卡壳的地方不再焦虑，而是会主动向我寻求启发。他敲代码的姿态越来越稳重，对语法的掌握也越来越精准，特别擅长处理细节逻辑。\n收获：李晨最大的收获是学会了如何面对困难。他在战胜瓶颈的过程中收获了最宝贵的意志力和自信心，逻辑思维能力也随之突飞猛进，完成了从畏难到热爱的转变。" },


    "单凯睿": { photo: "img/shankairui.jpg", comment: "引言：凯睿是个观察力极其敏锐的孩子。在单片机课堂上他的感知力特别强，甚至连我换了个手机壳他都能第一时间发现。这种细致入微的观察力也体现在了他的代码里，他在调试传感器阈值时，总能精准地找到那个最合适的临界点。\n表现：作为一个心思细腻的男孩，他很喜欢和我探讨一些生活中的物理现象如何用编程来实现。他在拼搭硬件时非常注重平衡和美感，每一根跳线都要理得顺顺当当。他在写代码时非常有预见性，会提前考虑可能出现的错误，这种缜密的思维非常难得。\n收获：经过这段时间的锻炼，他把理论联系实际的能力越来越强了。他收获了严谨的逻辑思维和敏锐的问题发现能力，学会了如何用技术手段去优化生活中的细节。" },



    "韩梓茂": { photo: "img/hanzimao.jpg", comment: "引言：我很喜欢茂茂，梓茂是个充满表现欲和舞台魅力的男孩。每次写完Scratch项目，他都迫不及待地要给大家演示，而且还会配上非常生动的肢体语言和解说词，经常把我和全班同学逗得哈哈大笑。他这种乐观和自信是班里最珍贵的活力来源。\n表现：作为一个极富个性的男孩，他把编程当成了表达自我的一种艺术形式。他对代码的理解并不死板，总是带着一种灵动。在单片机的组装上，他也总能有一些别出心裁的设计。他跟我交流时非常大方，会详细描述他设计的剧情，那种投入的样子非常有感染力。\n收获：经过这段时间的学习，梓茂在程序逻辑和自我表达上都收获了长足的进步。他学会了用逻辑去支撑他的创意，让他的表演变得更有深度。他收获了自信心和用技术实现想象力的快乐。" }
};

const urlParams = new URLSearchParams(window.location.search);
const name = urlParams.get('name');

if(name && studentData[name]) {
    const info = studentData[name];
    document.getElementById('studentName').innerText = name;
    document.getElementById('studentPhoto').src = info.photo;
    document.getElementById('studentComment').innerText = info.comment;
} else if(name) {
    document.getElementById('studentName').innerText = name;
    document.getElementById('studentComment').innerText = "暂无详细评语。";
}
