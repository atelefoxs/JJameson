<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的37位学生-文字风暴版</title>
<style>
body {
margin: 0;
overflow: hidden;
background-color: #fcfbf9;
font-family: 'Helvetica Neue', Arial, sans-serif;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
}
.student-container {
position: absolute;
cursor: pointer;
user-select: none;
animation: fly linear infinite alternate;
display: flex;
align-items: center;
}
.student-name {
color: #4a4a4a;
font-size: 1.1rem;
font-weight: bold;
letter-spacing: 2px;
z-index: 10;
transition: color 0.3s;
white-space: nowrap;
}
.student-container:hover .student-name {
color: #d4a373;
}
.trail-char {
position: absolute;
color: #d4a373;
opacity: 0.6;
pointer-events: none;
white-space: nowrap;
font-family: monospace;
animation: scatter var(--t) linear infinite;
}
@keyframes fly {
0% { transform: translate(0, 0) rotate(-3deg); }
100% { transform: translate(40px, -40px) rotate(3deg); }
}
@keyframes scatter {
0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.8; }
100% { transform: translate(var(--x), var(--y)) scale(0.1) rotate(var(--r)); opacity: 0; }
}
@media screen and (max-width: 768px) and (orientation: portrait) {
body {
width: 100vh;
height: 100vw;
transform: rotate(90deg);
transform-origin: top left;
margin-left: 100vw;
position: fixed;
overflow: hidden;
}
}
</style>
</head>
<body>
<script>
const students = [
"彭雨露", "李鸣宇", "柯艺博", "李政岩", "吴俊毅",
"牛津", "白展旭", "房本泽", "李继龙",
"赵一卓", "张易洋", "丁修煜", "田顺泽", "赵佑旭", "路浩洋", "大正",
"胡家宝", "赵恩卓", "郭昊阳", "房晓晨",
"王昱棋", "高润泽", "张秉政", "张泽昊",
"张泽恒", "张泽航", "王钰焯", "张禹森",
"王浩琪", "孙铭朗", "田交正",
"李金恒", "陈子嘉", "岳政硕", "李晨",
"单凯睿", "韩梓茂"
];
const chars = "!@#$%^&*()_+-=[]{}|;':,.<>/?0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ希腊字母αβγδεζηθικλμνξοπρστυφχψω*^O^*";
function createStudent(name) {
const container = document.createElement('div');
container.className = 'student-container';
const nameEl = document.createElement('div');
nameEl.className = 'student-name';
nameEl.innerText = name;
container.style.left = Math.random() * 80 + 10 + '%';
container.style.top = Math.random() * 80 + 10 + '%';
const mainDuration = 10 + Math.random() * 10;
container.style.animationDuration = mainDuration + 's';
container.style.animationDelay = '-' + Math.random() * 10 + 's';
const particleCount = 30; 
for (let i = 0; i < particleCount; i++) {
const span = document.createElement('span');
span.className = 'trail-char';
span.innerText = chars[Math.floor(Math.random() * chars.length)];
const x = (Math.random() - 1.5) * 200 + 'px'; 
const y = (Math.random() - 0.5) * 120 + 'px';
const r = (Math.random() * 720 - 360) + 'deg';
const t = (0.4 + Math.random() * 1.2) + 's';
const delay = -(Math.random() * 2) + 's';
const size = (0.4 + Math.random() * 0.7) + 'rem';
span.style.setProperty('--x', x);
span.style.setProperty('--y', y);
span.style.setProperty('--r', r);
span.style.setProperty('--t', t);
span.style.animationDelay = delay;
span.style.fontSize = size;
container.appendChild(span);
}
container.appendChild(nameEl);
container.addEventListener('click', () => {
window.location.href = 'student.html?name=' + encodeURIComponent(name);
});
document.body.appendChild(container);
}
students.forEach(name => createStudent(name));
</script>
</body>
</html>
